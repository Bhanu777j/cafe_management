<!doctype html>
<html>
  <head>
    <title>Bill</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body class="bill-page">
    <h1>Bhanu Feast</h1>
    <h2>Your Order Bill</h2>

    <div class="bill-box">
      <table>
        <tr>
          <th>Item</th>
          <th>Quantity</th>
          <th>Price</th>
        </tr>

        {% for item, qty, price in items %}

        <tr>
          <td>{{item}}</td>
          <td>{{qty}}</td>
          <td>₹{{price}}</td>
        </tr>

        {% endfor %}

        <tr class="total">
          <td colspan="2">Total</td>
          <td>₹{{total}}</td>
        </tr>
      </table>

      <a href="/" class="back">Back to Home</a>
    </div>
  </body>
</html>
